<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>

    <!-- Background gradient: deep navy → dark violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#07090f"/>
      <stop offset="50%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#130820"/>
    </linearGradient>

    <!-- Violet glow radial -->
    <radialGradient id="gv" cx="75%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan glow radial -->
    <radialGradient id="gc" cx="18%" cy="30%" r="40%">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>

    <!-- Text shimmer gradient -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="38%"  stop-color="#ffffff"/>
      <stop offset="68%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="al" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="gr" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0L0 0 0 44" fill="none" stroke="#7c3aed" stroke-width="0.25" opacity="0.14"/>
    </pattern>

    <!-- Clip to banner bounds -->
    <clipPath id="bc">
      <rect width="900" height="280"/>
    </clipPath>

    <!-- Typewriter clip rect — expands from 0 to full text width -->
    <clipPath id="tw">
      <rect x="0" y="88" height="62" width="0">
        <animate attributeName="width"
          from="0" to="620"
          dur="2.2s" begin="0.2s"
          fill="freeze"
          calcMode="linear"/>
      </rect>
    </clipPath>

    <!-- Subtitle fade clip -->
    <clipPath id="sc">
      <rect x="0" y="155" height="30" width="0">
        <animate attributeName="width"
          from="0" to="760"
          dur="1.6s" begin="2.6s"
          fill="freeze"
          calcMode="linear"/>
      </rect>
    </clipPath>

    <!-- Badge row reveal clip -->
    <clipPath id="brc">
      <rect x="0" y="196" height="36" width="0">
        <animate attributeName="width"
          from="0" to="420"
          dur="0.9s" begin="4.4s"
          fill="freeze"
          calcMode="linear"/>
      </rect>
    </clipPath>

  </defs>

  <!-- ── Base layers ── -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#gr)"/>
  <rect width="900" height="280" fill="url(#gv)"/>
  <rect width="900" height="280" fill="url(#gc)"/>

  <!-- ── Floating particles (SVG-native animate) ── -->
  <g clip-path="url(#bc)">

    <!-- particle 1 -->
    <circle cx="820" cy="48" r="3.5" fill="#7c3aed" opacity="0.7">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 7,-16; -5,-8; 0,0" dur="5.4s" repeatCount="indefinite"/>
    </circle>

    <!-- particle 2 -->
    <circle cx="762" cy="218" r="2.2" fill="#06b6d4" opacity="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -9,13; 11,6; 0,0" dur="6.9s" repeatCount="indefinite"/>
    </circle>

    <!-- particle 3 -->
    <circle cx="858" cy="158" r="4" fill="#a78bfa" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -4,-21; 6,-9; 0,0" dur="4.6s" repeatCount="indefinite" begin="1.2s"/>
    </circle>

    <!-- particle 4 -->
    <circle cx="682" cy="38" r="2.5" fill="#06b6d4" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 12,8; -6,14; 0,0" dur="7.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>

    <!-- particle 5 -->
    <circle cx="78" cy="198" r="3" fill="#7c3aed" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -8,-14; 4,-6; 0,0" dur="5.9s" repeatCount="indefinite" begin="2s"/>
    </circle>

    <!-- particle 6 -->
    <circle cx="148" cy="248" r="2" fill="#a78bfa" opacity="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 10,-10; -6,-18; 0,0" dur="6.4s" repeatCount="indefinite" begin="0.4s"/>
    </circle>

    <!-- particle 7 -->
    <circle cx="50" cy="52" r="3.5" fill="#06b6d4" opacity="0.4">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 5,18; -3,8; 0,0" dur="4.9s" repeatCount="indefinite" begin="1.6s"/>
    </circle>

    <!-- particle 8 -->
    <circle cx="802" cy="262" r="2.5" fill="#7c3aed" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -11,-8; 6,-14; 0,0" dur="5.6s" repeatCount="indefinite" begin="2.6s"/>
    </circle>

    <!-- particle 9 -->
    <circle cx="198" cy="28" r="2" fill="#a78bfa" opacity="0.4">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 8,12; -4,5; 0,0" dur="7.4s" repeatCount="indefinite" begin="0.9s"/>
    </circle>

    <!-- particle 10 -->
    <circle cx="618" cy="258" r="3" fill="#06b6d4" opacity="0.45">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -6,-16; 9,-8; 0,0" dur="5.2s" repeatCount="indefinite" begin="1.9s"/>
    </circle>

    <!-- diamonds -->
    <rect x="844" y="93" width="5" height="5" fill="#7c3aed" opacity="0.45" transform="rotate(45,846,95)">
      <animateTransform attributeName="transform" type="rotate"
        values="45 846 95; 90 846 95; 45 846 95" dur="8s" repeatCount="indefinite"/>
    </rect>

    <rect x="104" y="134" width="4" height="4" fill="#06b6d4" opacity="0.4" transform="rotate(45,106,136)">
      <animateTransform attributeName="transform" type="rotate"
        values="45 106 136; 90 106 136; 45 106 136" dur="6s" repeatCount="indefinite" begin="1s"/>
    </rect>

    <!-- wave dashes (stroke-dashoffset animation) -->
    <path d="M-60,240 Q90,222 200,240 Q310,258 420,240 Q530,222 640,240 Q750,258 860,240 Q970,222 1020,240"
          fill="none" stroke="url(#al)" stroke-width="1.2"
          stroke-dasharray="8 6" opacity="0.22">
      <animate attributeName="stroke-dashoffset"
        from="0" to="-200" dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M-60,256 Q110,238 220,256 Q330,274 440,256 Q550,238 660,256 Q770,274 880,256 Q990,238 1040,256"
          fill="none" stroke="#7c3aed" stroke-width="0.7"
          stroke-dasharray="5 9" opacity="0.18">
      <animate attributeName="stroke-dashoffset"
        from="0" to="-200" dur="5.5s" repeatCount="indefinite" begin="-1.8s"/>
    </path>

  </g>

  <!-- ── Left accent bar ── -->
  <rect x="58" y="86" width="3" height="118" rx="1.5" fill="url(#al)" opacity="0.9"/>

  <!-- ── Content group ── -->
  <g transform="translate(80,0)">

    <!-- HEADLINE — typewriter via clipPath expansion -->
    <g clip-path="url(#tw)">
      <text x="0" y="142"
            font-family="'Courier New','Lucida Console',monospace"
            font-size="47" font-weight="700" letter-spacing="-0.5"
            fill="url(#tg)">Hi, I'm Piyush 👋</text>
    </g>

    <!-- blinking cursor -->
    <text x="478" y="142"
          font-family="'Courier New',monospace"
          font-size="47" font-weight="700" fill="#06b6d4">
      <animate attributeName="opacity"
        values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1"
        dur="1.1s" repeatCount="indefinite" begin="2.4s"/>|</text>

    <!-- SUBTITLE — reveal via clipPath -->
    <g clip-path="url(#sc)">
      <text x="2" y="178"
            font-family="'Courier New','Lucida Console',monospace"
            font-size="16" font-weight="400" letter-spacing="1.6"
            fill="#94a3b8">Building intelligent iOS apps  ·  BTech CSE AI/ML</text>
    </g>

    <!-- BADGE ROW — reveal via clipPath -->
    <g clip-path="url(#brc)">

      <!-- Swift -->
      <rect x="0" y="200" width="70" height="22" rx="4" fill="#FA7343" opacity="0.92"/>
      <text x="35" y="214.5"
            font-family="'Courier New',monospace"
            font-size="10" font-weight="700"
            fill="white" text-anchor="middle" letter-spacing="0.4">Swift</text>

      <!-- Python -->
      <rect x="78" y="200" width="74" height="22" rx="4" fill="#3572A5" opacity="0.92"/>
      <text x="115" y="214.5"
            font-family="'Courier New',monospace"
            font-size="10" font-weight="700"
            fill="white" text-anchor="middle" letter-spacing="0.4">Python</text>

      <!-- Docker -->
      <rect x="160" y="200" width="70" height="22" rx="4" fill="#1c1c2e"/>
      <rect x="160" y="200" width="70" height="22" rx="4" fill="none" stroke="#06b6d4" stroke-width="1"/>
      <text x="195" y="214.5"
            font-family="'Courier New',monospace"
            font-size="10" font-weight="700"
            fill="#67e8f9" text-anchor="middle" letter-spacing="0.4">Docker</text>

      <!-- Kafka -->
      <rect x="238" y="200" width="64" height="22" rx="4" fill="#1c1c2e"/>
      <rect x="238" y="200" width="64" height="22" rx="4" fill="none" stroke="#7c3aed" stroke-width="1"/>
      <text x="270" y="214.5"
            font-family="'Courier New',monospace"
            font-size="10" font-weight="700"
            fill="#a78bfa" text-anchor="middle" letter-spacing="0.4">Kafka</text>

      <!-- AI/ML -->
      <rect x="310" y="200" width="60" height="22" rx="4" fill="#1c1c2e"/>
      <rect x="310" y="200" width="60" height="22" rx="4" fill="none" stroke="#10b981" stroke-width="1"/>
      <text x="340" y="214.5"
            font-family="'Courier New',monospace"
            font-size="10" font-weight="700"
            fill="#6ee7b7" text-anchor="middle" letter-spacing="0.4">AI/ML</text>

    </g>

  </g>

  <!-- ── Shimmer sweep (pure SVG animate) ── -->
  <g clip-path="url(#bc)" opacity="0.035">
    <rect x="-200" y="0" width="180" height="280" fill="white">
      <animate attributeName="x"
        from="-200" to="1100"
        dur="4.5s" repeatCount="indefinite" begin="2.8s"/>
    </rect>
  </g>

</svg>
